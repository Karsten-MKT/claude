<!DOCTYPE html>
<html lang="de">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="description" content="Foto-basierter Kalorienzähler mit KI-Analyse">
    <meta name="theme-color" content="#5CB88A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FAF6F1',
                        beige: '#F5F0EB',
                        'beige-dark': '#E8DFD6',
                        sand: '#D4C5B5',
                        sage: '#8B9E7E',
                        'sage-dark': '#6B7E5E',
                        'sage-light': '#A8B89E',
                        mint: '#5CB88A',
                        'mint-dark': '#3D8B63',
                        'mint-light': '#E8F5EE',
                        coral: '#F28B73',
                        'coral-light': '#FFF0EC',
                        sky: '#7BBBDD',
                        lavender: '#A78BDB',
                        sunshine: '#F2C94C',
                        warm: '#B8956A',
                        'warm-dark': '#9A7A52',
                        charcoal: '#3D3D3D',
                        'charcoal-light': '#6B6B6B',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-cream font-['Inter'] text-charcoal min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <!-- Header -->
        <header id="header" class="header-vine bg-white/80 backdrop-blur-md sticky top-0 z-50 px-5 py-4 border-b border-mint-light relative">
            <h1 class="text-xl font-semibold text-charcoal flex items-center gap-2">
                <svg class="w-5 h-5 text-mint" viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5s1.75 3.75 1.75 3.75C7 8 17 8 17 8z"/></svg>
                NutriSnap

            <p id="header-subtitle" class="text-xs text-charcoal-light mt-0.5"></p>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto pb-24">
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-mint-light z-50">
            <div class="max-w-md mx-auto flex justify-around items-center py-2 px-4">
                <button onclick="router.navigate('dashboard')" data-page="dashboard" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span class="text-[10px] font-medium">Dashboard</span>
                </button>
                <button onclick="router.navigate('capture')" data-page="capture" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl transition-all">
                    <div class="w-12 h-12 -mt-5 capture-fab rounded-full flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </div>
                    <span class="text-[10px] font-medium">Foto</span>
                </button>
                <button onclick="router.navigate('diary')" data-page="diary" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>

                </button>
                <button onclick="router.navigate('profile')" data-page="profile" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-xl transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <span class="text-[10px] font-medium">Profil</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/config.js?v=4"></script>
    <script src="js/store.js?v=4"></script>
    <script src="js/api.js?v=4"></script>
    <script src="js/nutrients.js?v=4"></script>
    <script src="js/water-reminders.js?v=4"></script>
    <script src="js/pages/dashboard.js?v=4"></script>
    <script src="js/pages/capture.js?v=4"></script>
    <script src="js/pages/diary.js?v=4"></script>
    <script src="js/pages/profile.js?v=4"></script>
    <script src="js/router.js?v=4"></script>
    <script src="js/app.js?v=4"></script>

</html>
