<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Wood texture background -->
    <linearGradient id="wood-bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="20%" stop-color="#2d1f12"/>
      <stop offset="40%" stop-color="#352515"/>
      <stop offset="60%" stop-color="#2a1c0f"/>
      <stop offset="80%" stop-color="#332313"/>
      <stop offset="100%" stop-color="#241810"/>
    </linearGradient>
    <!-- Wood grain overlay -->
    <linearGradient id="wood-grain" x1="0" y1="0" x2="0.05" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="rgba(60,40,20,0.3)"/>
      <stop offset="30%" stop-color="transparent"/>
      <stop offset="45%" stop-color="rgba(50,35,18,0.25)"/>
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="75%" stop-color="rgba(55,37,19,0.2)"/>
      <stop offset="90%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(45,30,15,0.15)"/>
    </linearGradient>
    <!-- Gold gradient for knot -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e0b8"/>
      <stop offset="25%" stop-color="#d4b86a"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="75%" stop-color="#b89940"/>
      <stop offset="100%" stop-color="#9a7e30"/>
    </linearGradient>
    <!-- Gold highlight -->
    <linearGradient id="gold-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ecd0"/>
      <stop offset="50%" stop-color="#dcc474"/>
      <stop offset="100%" stop-color="#b8963a"/>
    </linearGradient>
    <!-- Gold dark for depth -->
    <linearGradient id="gold-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a08530"/>
      <stop offset="100%" stop-color="#7a6420"/>
    </linearGradient>
    <!-- Subtle inner shadow -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="85%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </radialGradient>
    <!-- Filter for subtle emboss on knot -->
    <filter id="knot-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="inner-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#d4b86a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background: dark wood -->
  <rect width="512" height="512" rx="80" fill="url(#wood-bg)"/>
  <!-- Wood grain texture lines -->
  <rect width="512" height="512" rx="80" fill="url(#wood-grain)"/>
  <!-- Additional grain lines -->
  <line x1="0" y1="60" x2="512" y2="55" stroke="rgba(50,35,15,0.15)" stroke-width="2"/>
  <line x1="0" y1="120" x2="512" y2="125" stroke="rgba(60,40,20,0.12)" stroke-width="1.5"/>
  <line x1="0" y1="180" x2="512" y2="178" stroke="rgba(50,35,15,0.1)" stroke-width="2"/>
  <line x1="0" y1="240" x2="512" y2="245" stroke="rgba(55,38,18,0.13)" stroke-width="1"/>
  <line x1="0" y1="310" x2="512" y2="306" stroke="rgba(50,35,15,0.11)" stroke-width="2"/>
  <line x1="0" y1="370" x2="512" y2="375" stroke="rgba(60,40,20,0.09)" stroke-width="1.5"/>
  <line x1="0" y1="430" x2="512" y2="428" stroke="rgba(50,35,15,0.12)" stroke-width="1"/>
  <!-- Vignette -->
  <rect width="512" height="512" rx="80" fill="url(#vignette)"/>

  <!-- Celtic Knot W - built from interlacing strands -->
  <g filter="url(#knot-shadow)" transform="translate(256,240)">
    <!--
      Celtic Knot W: Five main strokes with over/under interlacing
      The W consists of: left descender, left-inner ascender, center descender, right-inner ascender, right descender
      With circular knot loops at the three bottom valleys and two top peaks
    -->

    <!-- Outer dark outlines (thicker, darker) -->
    <g stroke="url(#gold-dark)" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left stroke down -->
      <path d="M-145,-110 L-105,90 C-100,115 -75,120 -60,95 L-30,-30"/>
      <!-- Left-center up and down -->
      <path d="M-30,-30 L0,90 C5,115 30,120 45,95 L75,-30"/>
      <!-- Right-center up -->
      <path d="M75,-30 L105,90 C110,115 135,120 150,95 L145,-110"/>
    </g>

    <!-- Main gold strands -->
    <g stroke="url(#gold)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left outer stroke -->
      <path d="M-145,-110 L-105,90 C-100,115 -75,120 -60,95 L-30,-30"/>
      <!-- Center V -->
      <path d="M-30,-30 L0,90 C5,115 30,120 45,95 L75,-30"/>
      <!-- Right outer stroke -->
      <path d="M75,-30 L105,90 C110,115 135,120 150,95 L145,-110"/>
    </g>

    <!-- Highlight strands (thinner, lighter) -->
    <g stroke="url(#gold-hi)" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
      <path d="M-145,-110 L-105,90 C-100,115 -75,120 -60,95 L-30,-30"/>
      <path d="M-30,-30 L0,90 C5,115 30,120 45,95 L75,-30"/>
      <path d="M75,-30 L105,90 C110,115 135,120 150,95 L145,-110"/>
    </g>

    <!-- Celtic knot loops at the valley intersections -->
    <!-- Left valley knot -->
    <circle cx="-82" cy="98" r="18" fill="none" stroke="url(#gold)" stroke-width="8"/>
    <circle cx="-82" cy="98" r="18" fill="none" stroke="url(#gold-hi)" stroke-width="3" opacity="0.5"/>

    <!-- Center valley knot -->
    <circle cx="0" cy="105" r="18" fill="none" stroke="url(#gold)" stroke-width="8"/>
    <circle cx="0" cy="105" r="18" fill="none" stroke="url(#gold-hi)" stroke-width="3" opacity="0.5"/>

    <!-- Right valley knot -->
    <circle cx="82" cy="98" r="18" fill="none" stroke="url(#gold)" stroke-width="8"/>
    <circle cx="82" cy="98" r="18" fill="none" stroke="url(#gold-hi)" stroke-width="3" opacity="0.5"/>

    <!-- Top crossing knots -->
    <!-- Left top -->
    <circle cx="-48" cy="-70" r="14" fill="none" stroke="url(#gold)" stroke-width="7"/>
    <circle cx="-48" cy="-70" r="14" fill="none" stroke="url(#gold-hi)" stroke-width="3" opacity="0.4"/>

    <!-- Right top -->
    <circle cx="48" cy="-70" r="14" fill="none" stroke="url(#gold)" stroke-width="7"/>
    <circle cx="48" cy="-70" r="14" fill="none" stroke="url(#gold-hi)" stroke-width="3" opacity="0.4"/>

    <!-- Over/Under crossing marks - small background patches to create interlacing illusion -->
    <!-- Left crossing -->
    <line x1="-65" y1="-10" x2="-55" y2="10" stroke="#2d1f12" stroke-width="24" stroke-linecap="round"/>
    <line x1="-65" y1="-10" x2="-55" y2="10" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>

    <!-- Center-left crossing -->
    <line x1="-15" y1="20" x2="-5" y2="40" stroke="#2d1f12" stroke-width="24" stroke-linecap="round"/>
    <line x1="-15" y1="20" x2="-5" y2="40" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>

    <!-- Center-right crossing -->
    <line x1="5" y1="20" x2="15" y2="40" stroke="#2d1f12" stroke-width="24" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="15" y2="40" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>

    <!-- Right crossing -->
    <line x1="55" y1="-10" x2="65" y2="10" stroke="#2d1f12" stroke-width="24" stroke-linecap="round"/>
    <line x1="55" y1="-10" x2="65" y2="10" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>

    <!-- Terminal ornamental dots at the tops -->
    <circle cx="-145" cy="-115" r="8" fill="url(#gold)"/>
    <circle cx="-145" cy="-115" r="4" fill="url(#gold-hi)" opacity="0.7"/>
    <circle cx="145" cy="-115" r="8" fill="url(#gold)"/>
    <circle cx="145" cy="-115" r="4" fill="url(#gold-hi)" opacity="0.7"/>
  </g>

  <!-- Decorative celtic border ring -->
  <rect x="20" y="20" width="472" height="472" rx="66" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.5"/>
  <rect x="30" y="30" width="452" height="452" rx="58" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>

  <!-- Corner knot ornaments -->
  <!-- Top-left -->
  <g opacity="0.4">
    <circle cx="58" cy="58" r="10" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="58" cy="58" r="4" fill="url(#gold)" opacity="0.6"/>
  </g>
  <!-- Top-right -->
  <g opacity="0.4">
    <circle cx="454" cy="58" r="10" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="454" cy="58" r="4" fill="url(#gold)" opacity="0.6"/>
  </g>
  <!-- Bottom-left -->
  <g opacity="0.4">
    <circle cx="58" cy="454" r="10" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="58" cy="454" r="4" fill="url(#gold)" opacity="0.6"/>
  </g>
  <!-- Bottom-right -->
  <g opacity="0.4">
    <circle cx="454" cy="454" r="10" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="454" cy="454" r="4" fill="url(#gold)" opacity="0.6"/>
  </g>

  <!-- "IRISH PUB" text at bottom -->
  <text x="256" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="36" fill="url(#gold)" letter-spacing="8" opacity="0.85">IRISH PUB</text>
</svg>
