<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111">
  <title>Karsten's Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: #ccc;
    }
    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 600px;
    }
    .app-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      text-decoration: none;
      color: #eee;
      transition: transform 0.15s, border-color 0.15s;
    }
    .app-card:hover {
      transform: translateY(-2px);
      border-color: #c8a96e;
    }
    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      object-fit: cover;
      margin-bottom: 0.75rem;
    }
    .app-name {
      font-size: 1rem;
      font-weight: 600;
    }
    .app-desc {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <h1>Meine Apps</h1>
  <div class="apps">
    <a href="winchester/" class="app-card">
      <img src="winchester/icon.jpg" alt="Winchester" class="app-icon">
      <div class="app-name">Winchester</div>
      <div class="app-desc">Irish Pub App</div>
    </a>
  </div>
</body>
</html>
